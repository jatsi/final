<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://us.123rf.com/450wm/alenalevina/alenalevina1703/alenalevina170300059/73692794-supermercado-carrinho-de-compras-vector-redondo-%C3%ADcone-de-com%C3%A9rcio-laranja.jpg?ver=6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoMarket - EcoMarket</title>

    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </head>
  <body style="background-color: #63574e;">
    <header class="navbar-fija shadow-sm" style="background-color: #F5F5DC; border-bottom: 1px solid #D2B48C;">
      <div class="container-fluid d-flex align-items-center gap-3 py-2 px-4">
    
        <a href="javascript:void(0)" id="btn-logo-inicio" class="d-flex align-items-center text-decoration-none" title="Volver al Inicio">
          <img src="/logo.png" 
            alt="Logo EcoMarket" 
            style="height: 80px; width: auto; 
            object-fit: contain; 
            cursor: pointer;   
            border-radius: 50px; 
            padding: 5px;">
        </a>

       <button class="btn rounded-pill px-4" 
        type="button" 
        data-bs-toggle="offcanvas" 
        data-bs-target="#menuCategorias"
        style="background-color: #977c6b; color: white; border: none; font-weight: 500;"> 
        <iconify-icon icon="mdi:menu" class="me-2"></iconify-icon> Categorías </button>

      <div class="offcanvas offcanvas-start" tabindex="-1" id="menuCategorias">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" style="color: #382819; font-weight: bold;">Productos</h5> 
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
          <div class="list-group list-group-flush" id="lista-categorias-menu"></div>
        </div>
      </div>

        <div class="input-group flex-grow-2 mx-4">
          <input id="busqueda-input" type="text" class="form-control rounded-start-pill border-end-0" placeholder="Buscar productos..." aria-label="Buscar">
          <button id="btn-buscar" class="input-group-text bg-white rounded-end-pill border-start-0" type="button" aria-label="Buscar productos">
            <iconify-icon icon="mdi:magnify" style="color: var(--primary-violet); font-size: 1rem;"></iconify-icon>
          </button>
        </div>
      <a href="javascript:void(0)" 
          class="text-decoration-none" 
          style="color: #6F4E37;" 
          data-bs-toggle="modal" 
          data-bs-target="#modalLogin">
          <iconify-icon icon="mdi:account-outline" style="font-size: 1.8rem;"></iconify-icon>
        </a>

          <button class="btn d-flex gap-3 fs-4 p-0 border-0 bg-transparent" 
              type="button"
              aria-expanded="false"
              aria-controls="carritoCollapse"
              style="color: #6F4E37; position: relative; cursor: pointer;">
          <iconify-icon icon="mdi:cart-outline"></iconify-icon>
          <span id="carrito-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">
            0
          </span>
      </button>
    </div>
      </header>

<div class="collapse carrito-collapse" id="carritoCollapse">
      <div class="card shadow carrito-popup border-0">
        <div class="card-body">
          <h6 class="fw-bold mb-3" style="color: #6F4E37;">Mi carrito</h6>
          <div id="carrito-items">
            <p class="text-muted small mb-0">Tu carrito está vacío.</p>
          </div>
          <hr>
          <div class="d-flex justify-content-between fw-bold">
            <span>Total</span>
            <span id="carrito-total">S/ 0.00</span>
          </div>
        </div>
      </div>
    </div>

    <div id="app"></div>

    <div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #F5F5DC; border-radius: 20px;">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold" id="detalleNombre" style="color: #382819;"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body text-center" id="detalleCuerpo">
            </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <div class="modal fade" id="modalLogin" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #F5F5DC; border-radius: 20px; border: none;">
          
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold" style="color: #6F4E37;">Bienvenido de nuevo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body px-4 pb-4">
            <form id="formLogin">
              <div class="mb-3">
                <label class="form-label small fw-bold" style="color: #6F4E37;">Correo Electrónico</label>
                <input type="email" class="form-control rounded-pill border-0 shadow-sm" placeholder="ejemplo@correo.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label small fw-bold" style="color: #6F4E37;">Contraseña</label>
                <input type="password" class="form-control rounded-pill border-0 shadow-sm" placeholder="••••••••" required>
              </div>
              
              <div class="d-grid gap-2">
                <button type="submit" class="btn text-white rounded-pill fw-bold py-2 shadow-sm" style="background-color: #6F4E37; border: none;">
                  Iniciar Sesión
                </button>
                <button type="button" class="btn btn-link btn-sm text-decoration-none" style="color: #6F4E37;">
                  ¿Olvidaste tu contraseña?
                </button>
              </div>
            </form>
          </div>

          <div class="modal-footer border-0 justify-content-center bg-white rounded-bottom-4 py-3" style="border-radius: 0 0 20px 20px;">
            <span class="small text-muted">¿No tienes cuenta?</span>
            <a href="#" class="small fw-bold text-decoration-none" style="color: #6F4E37;">Regístrate aquí</a>
          </div>

        </div>
      </div>
</div>
  </body>
</html>
